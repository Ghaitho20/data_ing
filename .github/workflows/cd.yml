name: CD Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/workflows/**'
      - 'README.md'
      - 'docs/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Terraform Repo
        uses: actions/checkout@v4
        with:
          repository: Ghaitho20/terraform-demo_spark-7ee5ed5a
          token: ${{ secrets.GH_TOKEN }}

      - name: Checkout Data Repo
        uses: actions/checkout@v4
        with:
          repository: Ghaitho20/data_ing
          token: ${{ secrets.GH_TOKEN }}
      - name: Deployment placeholder
        run: echo 'CD Pipeline - No Glue jobs configured'
